  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>게시판 AI 에이전트</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    /* ── CSS 변수 ── */
    :root {
      --bg:        #0d0f14;
      --surface:   #151820;
      --surface2:  #1c2030;
      --border:    #252a3a;
      --accent:    #4f8ef7;
      --accent2:   #7c5cbf;
      --success:   #3ecf8e;
      --error:     #f76f6f;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --user-bg:   #1e2a45;
      --agent-bg:  #1a1f2e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 헤더 ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 28px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    header h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    header span {
      font-size: 12px;
      color: var(--muted);
      margin-left: 4px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: var(--success);
      border-radius: 50%;
      margin-left: auto;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── 메인 레이아웃 ── */
    main {
      display: grid;
      grid-template-columns: 1fr 340px;
      flex: 1;
      overflow: hidden;
    }

    /* ── 채팅 영역 ── */
    .chat-section {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    /* 스크롤바 스타일 */
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── 말풍선 ── */
    .message {
      display: flex;
      gap: 10px;
      animation: fadeUp 0.25s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user  { flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .message.user  .avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
    .message.agent .avatar { background: var(--surface2); border: 1px solid var(--border); }

    .bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
    }

    .message.user  .bubble {
      background: var(--user-bg);
      border: 1px solid rgba(79,142,247,0.2);
      border-top-right-radius: 3px;
    }

    .message.agent .bubble {
      background: var(--agent-bg);
      border: 1px solid var(--border);
      border-top-left-radius: 3px;
    }

    .bubble .time {
      font-size: 10px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* 로딩 dots */
    .loading-dots span {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--muted);
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.2s infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%            { transform: translateY(-6px); }
    }

    /* ── 입력창 ── */
    .chat-input {
      padding: 16px 28px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .chat-input textarea {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 120px;
      transition: border-color 0.2s;
      line-height: 1.5;
    }

    .chat-input textarea:focus { border-color: var(--accent); }
    .chat-input textarea::placeholder { color: var(--muted); }

    .send-btn {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: opacity 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    .send-btn:hover   { opacity: 0.85; }
    .send-btn:active  { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── 빠른 명령 버튼 ── */
    .quick-cmds {
      padding: 0 28px 12px;
      background: var(--surface);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .quick-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      transition: all 0.2s;
    }

    .quick-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── 사이드 패널 (게시글 목록) ── */
    .side-panel {
      display: flex;
      flex-direction: column;
      background: var(--surface);
    }

    .panel-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-header h2 {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .refresh-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      padding: 4px;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .refresh-btn:hover { color: var(--accent); background: var(--surface2); }

    /* 게시글 목록 */
    .post-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .post-list::-webkit-scrollbar { width: 3px; }
    .post-list::-webkit-scrollbar-thumb { background: var(--border); }

    .post-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.2s;
      animation: fadeUp 0.2s ease;
    }

    .post-card:hover {
      border-color: var(--accent);
      transform: translateX(2px);
    }

    .post-card .post-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .post-card .post-meta {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      gap: 8px;
    }

    .post-card .post-id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      background: rgba(79,142,247,0.1);
      padding: 2px 6px;
      border-radius: 4px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 13px;
    }

    .empty-state .icon { font-size: 32px; margin-bottom: 10px; }

    /* ── API 설정 ── */
    .api-config {
      padding: 12px;
      border-top: 1px solid var(--border);
    }

    .api-config input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      outline: none;
    }

    .api-config input:focus { border-color: var(--accent); }
    .api-config label { font-size: 11px; color: var(--muted); margin-bottom: 6px; display: block; }

    /* ── 토스트 알림 ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 13px;
      transition: transform 0.3s ease;
      z-index: 999;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error   { border-color: var(--error);   color: var(--error); }
  </style>
</head>
<body>

<!-- ── 헤더 ── -->
<header>
  <div className="logo">🤖</div>
  <div>
    <h1>게시판 AI 에이전트 <span>Board Manager</span></h1>
  </div>
  <div className="status-dot" id="statusDot" title="서버 연결 상태"></div>
</header>

<!-- ── 메인 ── -->
<main>

  <!-- 채팅 영역 -->
  <section className="chat-section">
    <div className="chat-messages" id="chatMessages">
      <!-- 안내 메시지 -->
      <div className="message agent">
        <div className="avatar">🤖</div>
        <div className="bubble">
          안녕하세요! 게시판 AI 에이전트입니다.<br/>
          자연어로 게시글을 관리할 수 있어요.<br/><br/>
          예시:<br/>
          📝 <b>"오늘 일기 제목으로 김하영이 작성해줘"</b><br/>
          📋 <b>"게시글 목록 보여줘"</b><br/>
          🔍 <b>"1번 글 조회해줘"</b>
          <div className="time">지금</div>
        </div>
      </div>
    </div>

    <!-- 빠른 명령 -->
    <div className="quick-cmds">
      <button className="quick-btn" onclick="quickSend('게시글 목록 보여줘')">📋 목록 보기</button>
      <button className="quick-btn" onclick="quickSend('1번 글 보여줘')">🔍 1번 글 조회</button>
      <button className="quick-btn" onclick="quickSend('1번 글 삭제해줘')">🗑️ 1번 글 삭제</button>
    </div>

    <!-- 입력창 -->
    <div className="chat-input">
      <textarea
        id="userInput"
        placeholder="게시글 작성, 조회, 수정, 삭제를 자연어로 입력하세요..."
        rows="1"
        onkeydown="handleKeydown(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button className="send-btn" id="sendBtn" onclick="sendMessage()" title="전송 (Enter)">➤</button>
    </div>
  </section>

  <!-- 사이드 패널 -->
  <aside className="side-panel">
    <div className="panel-header">
      <h2>📄 게시글 목록</h2>
      <button className="refresh-btn" onclick="fetchPosts()" title="새로고침">↻</button>
    </div>

    <div className="post-list" id="postList">
      <div className="empty-state">
        <div className="icon">📭</div>
        새로고침 버튼을 눌러<br/>게시글을 불러오세요
      </div>
    </div>

    <!-- API 서버 URL 설정 -->
    <div className="api-config">
      <label>🔌 API 서버 URL</label>
      <input type="text" id="apiUrl" value="http://localhost:8000" placeholder="http://localhost:8000"/>
    </div>
  </aside>
</main>

<!-- 토스트 알림 -->
<div className="toast" id="toast"></div>

<script>
  // ── 현재 thread_id (세션 고정) ──
  const THREAD_ID = "frontend_session_" + Date.now();

  // ── 시간 포맷 ──
  function nowTime() {
    return new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  }

  // ── 토스트 알림 ──
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── 메시지 추가 ──
  function addMessage(role, content) {
    const container = document.getElementById('chatMessages');

    const wrap = document.createElement('div');
    wrap.className = `message ${role}`;

    // role에 따라 아바타 이모지 결정
    const emoji = role === 'user' ? '🧑‍💻' : '🤖';

    wrap.inner = `
      <div className="avatar">${emoji}</div>
      <div className="bubble">
        ${content}
        <div className="time">${nowTime()}</div>
      </div>
    `;

    container.appendChild(wrap);
    // 스크롤 최하단 이동
    container.scrollTop = container.scrollHeight;
    return wrap;
  }

  // ── 로딩 말풍선 추가 ──
  function addLoading() {
    const container = document.getElementById('chatMessages');
    const wrap = document.createElement('div');
    wrap.className = 'message agent';
    wrap.id = 'loadingMsg';
    wrap.innerHTML = `
      <div className="avatar">🤖</div>
      <div className="bubble">
        <div className="loading-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    `;
    container.appendChild(wrap);
    container.scrollTop = container.scrollHeight;
  }

  // ── 로딩 말풍선 제거 ──
  function removeLoading() {
    const el = document.getElementById('loadingMsg');
    if (el) el.remove();
  }

  // ── 메시지 전송 ──
  async function sendMessage() {
    const input   = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const apiUrl  = document.getElementById('apiUrl').value.trim();
    const text    = input.value.trim();

    if (!text) return;

    // UI 초기화
    addMessage('user', text);
    input.value = '';
    autoResize(input);
    sendBtn.disabled = true;
    addLoading();

    try {
      // FastAPI /chat 엔드포인트 호출
      const res = await fetch(`${apiUrl}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: text, thread_id: THREAD_ID })
      });

      removeLoading();

      if (!res.ok) {
        const err = await res.json();
        addMessage('agent', `❌ 오류: ${err.detail || '서버 오류가 발생했습니다'}`);
        showToast('요청 실패', 'error');
        return;
      }

      const data = await res.json();
      addMessage('agent', data.result);

      // 게시글 관련 작업이면 목록 자동 갱신
      if (/작성|삭제|수정|목록|리스트/.test(text)) {
        setTimeout(fetchPosts, 500);
      }

    } catch (e) {
      removeLoading();
      addMessage('agent', `❌ 서버에 연결할 수 없습니다.<br/>API URL을 확인해주세요: <code>${apiUrl}</code>`);
      showToast('서버 연결 실패', 'error');
      updateStatus(false);
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  // ── 빠른 명령 ──
  function quickSend(text) {
    document.getElementById('userInput').value = text;
    sendMessage();
  }

  // ── Enter 키 전송 (Shift+Enter는 줄바꿈) ──
  function handleKeydown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // ── textarea 자동 높이 조절 ──
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  // ── 게시글 목록 불러오기 ──
  async function fetchPosts() {
    const apiUrl   = document.getElementById('apiUrl').value.trim();
    const postList = document.getElementById('postList');

    // 로딩 표시
    postList.innerHTML = `<div className="empty-state"><div className="icon">⏳</div>불러오는 중...</div>`;

    try {
      // /chat 으로 목록 요청
      const res = await fetch(`${apiUrl}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: '게시글 목록 보여줘', thread_id: 'list_refresh' })
      });

      if (!res.ok) throw new Error('서버 오류');

      const data = await res.json();
      updateStatus(true);

      // 응답에서 게시글 파싱 시도
      // list_posts tool이 JSON 배열을 반환하므로 파싱
      try {
        // 응답 텍스트에서 JSON 배열 추출
        const match = data.result.match(/\[.*\]/s);
        if (match) {
          const posts = JSON.parse(match[0]);
          renderPosts(posts);
        } else {
          // JSON 파싱 불가 시 응답 텍스트 그대로 표시
          postList.innerHTML = `
            <div className="empty-state">
              <div className="icon">📋</div>
              ${data.result}
            </div>`;
        }
      } catch {
        postList.innerHTML = `
          <div className="empty-state">
            <div className="icon">📋</div>
            ${data.result}
          </div>`;
      }

    } catch (e) {
      postList.innerHTML = `<div className="empty-state"><div className="icon">❌</div>불러오기 실패</div>`;
      updateStatus(false);
      showToast('목록 불러오기 실패', 'error');
    }
  }

  // ── 게시글 목록 렌더링 ──
  function renderPosts(posts) {
    const postList = document.getElementById('postList');

    if (!posts || posts.length === 0) {
      postList.innerHTML = `<div className="empty-state"><div className="icon">📭</div>게시글이 없습니다</div>`;
      return;
    }

    postList.innerHTML = '';
    posts.forEach(post => {
      const card = document.createElement('div');
      card.className = 'post-card';

      // 카드 클릭 시 해당 게시글 조회
      card.onclick = () => quickSend(`${post.id}번 글 보여줘`);

      card.innerHTML = `
        <div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">
          <span class="post-id">#${post.id}</span>
          <span className="post-title">${post.제목 || post.title || '제목 없음'}</span>
        </div>
        <div className="post-meta">
          <span>✍️ ${post.작성자 || post.author || '작성자 없음'}</span>
          ${post.created_at ? `<span>🕐 ${post.created_at.slice(0,10)}</span>` : ''}
        </div>
      `;
      postList.appendChild(card);
    });

    showToast(`${posts.length}개의 게시글을 불러왔습니다`);
  }

  // ── 서버 상태 표시 업데이트 ──
  function updateStatus(online) {
    const dot = document.getElementById('statusDot');
    dot.style.background = online ? 'var(--success)' : 'var(--error)';
  }

  // ── 서버 연결 체크 ──
  async function checkServer() {
    const apiUrl = document.getElementById('apiUrl').value.trim();
    try {
      const res = await fetch(`${apiUrl}/`);
      updateStatus(res.ok);
    } catch {
      updateStatus(false);
    }
  }

  // ── 초기화 ──
  checkServer();
</script>
